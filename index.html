<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼각함수 시각화 교육 앱 (Trigonometry Visualizer v2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>

<body>

    <h1 class="main-title">수학 수업 도우미</h1>

    <div class="app-container">
        
        <div class="side-index-wrapper">
            <div class="index-tab" data-unit="exp">지수함수와 로그함수</div>
            <div class="index-tab active" data-unit="trig">삼각함수</div>
        </div>

        <div id="unit-exp" class="unit-content">
            <h2 class="unit-title">지수함수와 로그함수 시각화</h2>
            
            <div class="exp-main-content">
                <!-- 좌측 히스토리 패널 -->
                <div class="history-panel">
                    <h3 class="history-title">추가된 함수</h3>
                    <div id="historyList" class="history-list">
                        <!-- 히스토리 아이템들이 동적으로 추가됩니다 -->
                    </div>
                </div>

                <!-- 우측 컨트롤 및 캔버스 영역 -->
                <div class="exp-right-panel">
                    <div class="color-picker" id="colorPicker">
                        <button class="color-btn active" data-color="#ff8bad" style="background-color: #ff8bad;"></button>
                        <button class="color-btn" data-color="#73a5ff" style="background-color: #73a5ff;"></button>
                        <button class="color-btn" data-color="#ffb86c" style="background-color: #ffb86c;"></button>
                        <button class="color-btn" data-color="#b19cd9" style="background-color: #b19cd9;"></button>
                        <button class="color-btn" data-color="#68d391" style="background-color: #68d391;"></button>
                        <button class="color-btn" data-color="#f6ad55" style="background-color: #f6ad55;"></button>
                        <button class="color-btn" data-color="#fc8181" style="background-color: #fc8181;"></button>
                        <button class="color-btn" data-color="#4fd1c5" style="background-color: #4fd1c5;"></button>
                        <button class="color-btn" data-color="#f6e05e" style="background-color: #f6e05e;"></button>
                        <button class="color-btn" data-color="#b794f4" style="background-color: #b794f4;"></button>
                    </div>

                    <div class="exp-controls">
                        <input type="text" id="funcInput" class="func-input" placeholder="함수식 (예: 2^x, log(x, 2), exp(x))">
                        <button class="draw-btn" id="drawBtn">추가하기</button>
                    </div>
                    <div class="error-message" id="funcError"></div>

                    <div class="canvas-wrapper">
                        <!-- 캔버스 사이즈 조절 700x500 -->
                        <canvas id="expCanvas" width="700" height="500"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="unit-trig" class="unit-content active">
            <h2 class="unit-title">삼각함수 시각화 교육 앱 (Trigonometry Visualizer v2)</h2>

            <div class="tabs">
                <button class="tab-btn active" data-func="definition">Definition (정의)</button>
                <button class="tab-btn" data-func="sin">Sine (사인)</button>
                <button class="tab-btn" data-func="cos">Cosine (코사인)</button>
                <button class="tab-btn" data-func="tan">Tangent (탄젠트)</button>
            </div>

        <div class="canvas-wrapper">
            <canvas id="mathCanvas" width="1560" height="400"></canvas>
        </div>

        <div class="controls">
            <div class="info-panel" id="infoText">sin(0°) = <span>0.00</span></div>

            <div class="r-slider-wrapper" id="rSliderWrapper">
                <div>반지름 r: <span id="rVal">1.0</span></div>
                <input type="range" id="rSlider" min="0.1" max="2.0" step="0.1" value="1.0" style="width:180px;">
            </div>

            <div class="slider-container">
                <span>-360°</span>
                <input type="range" id="angleSlider" min="-360" max="360" value="0">
                <span>360°</span>
                <button class="reset-btn" id="resetBtn">Reset</button>
            </div>
        </div>
        
        </div> <!-- End of unit-trig -->
    </div>

    <script src="app.js"></script>
</body>

</html>
